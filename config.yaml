# Australian Labour Market Data Scraper Configuration
# ====================================================

# Run mode: "full" or "incremental"
run_mode: "incremental"

# Target scope
scope:
  sites:
    - "jsa"
    - "dewr"
  datasets:
    - "salm"
    - "ivi"
    - "projections"
    - "total_vacancies"
    - "rlmi"
    - "labour_force_trending"

# Rate limiting & politeness
http:
  min_delay_seconds: 2.0
  max_delay_seconds: 5.0
  max_retries: 3
  retry_backoff_factor: 2.0
  timeout_seconds: 120
  user_agents:
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  default_headers:
    Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
    Accept-Language: "en-AU,en;q=0.9"

# Database (local PostgreSQL)
database:
  pg_host: "localhost"
  pg_port: 5432
  pg_database: "labour_market_au"
  pg_user: "postgres"
  pg_password: ""  # Use PGPASSWORD env var

# Downloads
downloads:
  base_dir: "./downloads"

# Export
export:
  enabled: true
  format: "csv"
  output_dir: "./exports"
  timestamp_files: true

# Monitored pages for change detection
monitor_pages:
  - site: "jsa"
    dataset: "ivi"
    page_url: "https://www.jobsandskills.gov.au/data/internet-vacancy-index"
    update_frequency: "monthly"
    content_selector: "div.field--type-text-long"
    date_selector: "div.field--type-text-long strong"
  - site: "jsa"
    dataset: "projections"
    page_url: "https://www.jobsandskills.gov.au/data/employment-projections"
    update_frequency: "annual"
    content_selector: "div.field--type-text-long"
  - site: "jsa"
    dataset: "total_vacancies"
    page_url: "https://www.jobsandskills.gov.au/data/total-new-vacancies"
    update_frequency: "monthly"
    content_selector: "div.field--type-text-long"
  - site: "jsa"
    dataset: "salm"
    page_url: "https://www.jobsandskills.gov.au/data/small-area-labour-markets"
    update_frequency: "quarterly"
    content_selector: "div.field--type-text-long"
    date_selector: "div.field--type-text-long strong"
  - site: "jsa"
    dataset: "rlmi"
    page_url: "https://www.jobsandskills.gov.au/data/regional-labour-market-indicator"
    update_frequency: "quarterly"
    content_selector: "div.field--type-text-long"
  - site: "jsa"
    dataset: "labour_force_trending"
    page_url: "https://www.jobsandskills.gov.au/data/labour-force-trending"
    update_frequency: "quarterly"
    content_selector: "div.field--type-text-long"
  - site: "dewr"
    dataset: "salm_smoothed"
    page_url: "https://www.dewr.gov.au/employment-research/small-area-labour-markets"
    update_frequency: "quarterly"
    content_selector: "div.field--type-text-long"
  - site: "dewr"
    dataset: "salm_unsmoothed"
    page_url: "https://www.dewr.gov.au/employment-research/small-area-labour-markets/methodology"
    update_frequency: "quarterly"
    content_selector: "div.field--type-text-long"

# Logging
logging:
  level: "INFO"
  file: "./logs/labour_market_au.log"
  console: true
  rotate_mb: 10
  keep_backups: 5
